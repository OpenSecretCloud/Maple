[package]
edition = "2018"
name = "phf_generator"
version = "0.8.0"
authors = ["Steven Fackler <sfackler@gmail.com>"]
description = "PHF generation logic"
license = "MIT"
repository = "https://github.com/sfackler/rust-phf"

# Maple advisory patch: upstream phf_generator 0.8.0 depends on rand 0.7.x.
# Keep this dependency at a patched rand version until Tauri removes this chain.
[dependencies]
phf_shared = "0.8.0"
rand = { version = "0.8.6", features = ["small_rng"] }
