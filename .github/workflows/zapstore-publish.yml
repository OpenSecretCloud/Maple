name: Publish to Zapstore

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: read

jobs:
  publish:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            zapstore.yaml
            frontend/src-tauri/icons/icon.png

      - name: Download APK from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.workflow_run.head_branch }}
        run: |
          echo "Downloading APK from release $RELEASE_TAG"
          gh release download "$RELEASE_TAG" \
            --pattern "app-universal-release.apk" \
            --dir .

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Install zsp
        run: |
          go install "github.com/zapstore/zsp@v0.4.5"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Publish to Zapstore
        env:
          SIGN_WITH: ${{ secrets.ZAPSTORE_SIGN_WITH }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          if [ -z "${SIGN_WITH}" ]; then
            echo "Missing required secret: ZAPSTORE_SIGN_WITH" >&2
            exit 1
          fi

          set +e
          output="$(
            zsp publish \
              --quiet \
              --commit "$COMMIT_SHA" \
              zapstore.yaml 2>&1
          )"
          status=$?
          set -e

          if [ -n "$output" ]; then
            printf '%s\n' "$output"
          fi

          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi

          if [[ "$output" == *"flag provided but not defined"* || "$output" == *"Usage of publish:"* ]]; then
            echo "zsp returned success but printed CLI usage, treating this as a failure." >&2
            exit 1
          fi
