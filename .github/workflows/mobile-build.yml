name: Mobile App CI

permissions:
  contents: read

on:
  push:
    branches: [ master ]

jobs:
  build-ios:
    runs-on: macos-26-xlarge
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # was v4
        with:
          persist-credentials: false

      # Xcode 26.5 is temporarily exposed as a beta app on macos-26 runners: https://github.com/actions/runner-images/issues/14108
      - name: Select Xcode 26.5
        id: select_xcode
        run: |
          set -euo pipefail
          for xcode_app in \
            /Applications/Xcode_26.5.0.app \
            /Applications/Xcode_26.5_beta_2.app \
            /Applications/Xcode_26.5_beta.app
          do
            if [ -x "${xcode_app}/Contents/Developer/usr/bin/xcodebuild" ]; then
              sudo xcode-select -s "${xcode_app}/Contents/Developer"
              xcode_info="$(xcodebuild -version)"
              printf '%s\n' "${xcode_info}"
              printf 'version=%s\n' "$(printf '%s\n' "${xcode_info}" | awk '/^Xcode / { print $2; exit }')" >> "${GITHUB_OUTPUT}"
              printf 'build=%s\n' "$(printf '%s\n' "${xcode_info}" | awk '/^Build version / { print $3; exit }')" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          done
          echo "Xcode 26.5 is not installed on this runner." >&2
          ls -1 /Applications/Xcode*.app >&2 || true
          exit 1

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # was v22
        with:
          github-token: ""

      - name: Cache Xcode DerivedData and SourcePackages
        uses: irgaly/xcode-cache@4141f139f00e335c6e1031fb93e667181f86146f # was v1
        with:
          key: xcode-cache-ios-xcode26.5-${{ steps.select_xcode.outputs.build }}-${{ github.workflow }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            xcode-cache-ios-xcode26.5-${{ steps.select_xcode.outputs.build }}-${{ github.workflow }}-
            xcode-cache-ios-xcode26.5-${{ steps.select_xcode.outputs.build }}-

      - name: Cache ONNX Runtime iOS artifact
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # was v4
        with:
          path: |
            frontend/src-tauri/onnxruntime-ios
          key: release-onnxruntime-ios-artifact-1.22.2-xcode26.5-${{ steps.select_xcode.outputs.build }}-${{ hashFiles('flake.lock', 'flake.nix', 'scripts/ci/_common.sh', 'scripts/ci/ios-onnxruntime.sh', 'frontend/src-tauri/scripts/build-ios-onnxruntime-all.sh', 'frontend/src-tauri/scripts/canonicalize-static-archive.py', 'frontend/src-tauri/scripts/onnxruntime-pins.sh') }}
          restore-keys: |
            release-onnxruntime-ios-artifact-1.22.2-xcode26.5-${{ steps.select_xcode.outputs.build }}-

      - name: Prepare ONNX Runtime iOS artifact
        run: nix develop .#apple -c ./scripts/ci/ios-onnxruntime.sh
        timeout-minutes: 90

      - name: Build Tauri iOS App (signed)
        run: nix develop .#apple -c ./scripts/ci/ios-release.sh
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
          MAPLE_ENFORCE_IOS_SIGNED_REPRODUCIBILITY: "1"
        timeout-minutes: 90

      - name: Collect iOS release checksums
        run: |
          nix develop .#apple -c ./scripts/ci/attestation-manifest.sh \
            ios-release-artifacts.sha256 \
            frontend/src-tauri/target/reproducibility/ios-release-final.sha256 \
            frontend/src-tauri/target/reproducibility/ios-release-*.sha256 \
            frontend/src-tauri/target/reproducibility/ios-release-*.txt \
            frontend/src-tauri/target/reproducibility/ios-onnxruntime-*.sha256
          cat ios-release-artifacts.sha256

      - name: Attest iOS release artifacts
        # Keep uploads/verifiers running if GitHub token policy rejects artifact attestation.
        continue-on-error: true
        uses: actions/attest@281a49d4cbb0a72c9575a50d18f6deb515a11deb # was v4
        with:
          subject-checksums: ios-release-artifacts.sha256

      - name: Upload iOS App
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # was v4
        with:
          name: maple-ios
          path: |
            frontend/src-tauri/gen/apple/build/arm64/*.ipa
            frontend/src-tauri/target/reproducibility/*.sha256
            frontend/src-tauri/target/reproducibility/*.txt
          retention-days: 5

  verify-ios-artifacts:
    needs: build-ios
    runs-on: macos-26-xlarge
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # was v4
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # was v22
        with:
          github-token: ""

      - name: Download iOS artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # was v4
        with:
          name: maple-ios
          path: artifacts

      - name: Verify iOS artifact reproducibility proofs
        run: nix develop .#ci -c ./scripts/ci/verify-release-artifacts.sh artifacts ios
        env:
          MAPLE_ENFORCE_IOS_SIGNED_REPRODUCIBILITY: "1"

  submit-ios-testflight:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: verify-ios-artifacts
    runs-on: macos-26-xlarge
    permissions:
      contents: read
    steps:
      # Xcode 26.5 is temporarily exposed as a beta app on macos-26 runners: https://github.com/actions/runner-images/issues/14108
      - name: Select Xcode 26.5
        run: |
          set -euo pipefail
          for xcode_app in \
            /Applications/Xcode_26.5.0.app \
            /Applications/Xcode_26.5_beta_2.app \
            /Applications/Xcode_26.5_beta.app
          do
            if [ -x "${xcode_app}/Contents/Developer/usr/bin/xcodebuild" ]; then
              sudo xcode-select -s "${xcode_app}/Contents/Developer"
              xcodebuild -version
              exit 0
            fi
          done
          echo "Xcode 26.5 is not installed on this runner." >&2
          ls -1 /Applications/Xcode*.app >&2 || true
          exit 1

      - name: Download verified iOS artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # was v4
        with:
          name: maple-ios
          path: artifacts

      - name: Prepare App Store Connect API key
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_API_ISSUER}" ] || [ -z "${APPLE_API_KEY}" ] || [ -z "${APPLE_API_PRIVATE_KEY}" ]; then
            echo "APPLE_API_ISSUER, APPLE_API_KEY, and APPLE_API_PRIVATE_KEY are required to submit to TestFlight." >&2
            exit 1
          fi

          mkdir -p "${HOME}/.private_keys"
          key_path="${HOME}/.private_keys/AuthKey_${APPLE_API_KEY}.p8"
          if ! printf '%s' "${APPLE_API_PRIVATE_KEY}" | base64 --decode > "${key_path}" 2>/dev/null; then
            printf '%s' "${APPLE_API_PRIVATE_KEY}" | base64 -D > "${key_path}"
          fi
          chmod 600 "${key_path}"

      - name: Submit verified IPA to TestFlight
        run: |
          set -euo pipefail
          IPA_PATH="$(find artifacts -name "*.ipa" | LC_ALL=C sort | head -n 1)"
          if [ -z "${IPA_PATH}" ]; then
            echo "No IPA found under downloaded artifacts" >&2
            exit 1
          fi

          xcrun altool --upload-app --type ios \
            --file "${IPA_PATH}" \
            --apiKey "${{ secrets.APPLE_API_KEY }}" \
            --apiIssuer "${{ secrets.APPLE_API_ISSUER }}"

  warm-ios-pr-onnx-cache:
    runs-on: macos-26-xlarge
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # was v4
        with:
          persist-credentials: false

      # Xcode 26.5 is temporarily exposed as a beta app on macos-26 runners: https://github.com/actions/runner-images/issues/14108
      - name: Select Xcode 26.5
        id: select_xcode
        run: |
          set -euo pipefail
          for xcode_app in \
            /Applications/Xcode_26.5.0.app \
            /Applications/Xcode_26.5_beta_2.app \
            /Applications/Xcode_26.5_beta.app
          do
            if [ -x "${xcode_app}/Contents/Developer/usr/bin/xcodebuild" ]; then
              sudo xcode-select -s "${xcode_app}/Contents/Developer"
              xcode_info="$(xcodebuild -version)"
              printf '%s\n' "${xcode_info}"
              printf 'version=%s\n' "$(printf '%s\n' "${xcode_info}" | awk '/^Xcode / { print $2; exit }')" >> "${GITHUB_OUTPUT}"
              printf 'build=%s\n' "$(printf '%s\n' "${xcode_info}" | awk '/^Build version / { print $3; exit }')" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          done
          echo "Xcode 26.5 is not installed on this runner." >&2
          ls -1 /Applications/Xcode*.app >&2 || true
          exit 1

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # was v22
        with:
          github-token: ""

      - name: Cache ONNX Runtime iOS artifact
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # was v4
        with:
          path: |
            frontend/src-tauri/onnxruntime-ios
          key: pr-onnxruntime-ios-artifact-1.22.2-xcode26.5-${{ steps.select_xcode.outputs.build }}-${{ hashFiles('flake.lock', 'flake.nix', 'scripts/ci/_common.sh', 'scripts/ci/ios-onnxruntime.sh', 'frontend/src-tauri/scripts/build-ios-onnxruntime-all.sh', 'frontend/src-tauri/scripts/canonicalize-static-archive.py', 'frontend/src-tauri/scripts/onnxruntime-pins.sh') }}
          restore-keys: |
            pr-onnxruntime-ios-artifact-1.22.2-xcode26.5-${{ steps.select_xcode.outputs.build }}-

      - name: Prepare ONNX Runtime iOS artifact
        run: nix develop .#apple -c ./scripts/ci/ios-onnxruntime.sh
        timeout-minutes: 90
