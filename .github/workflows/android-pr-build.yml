name: Android App PR Build

permissions:
  contents: read

on:
  pull_request:
    branches: [ master ]

jobs:
  build-android:
    runs-on: ubuntu-latest-8-cores
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # was v4
        with:
          persist-credentials: false
          # Cargo resolves path dependencies from the shared Tauri manifest
          # before platform cfg removes desktop-only Agent Mode code.
          submodules: recursive

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # was v22
        with:
          github-token: ""

      - name: Cache Bun dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # was v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/bun.lock') }}

      - name: Cache Gradle
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # was v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('frontend/src-tauri/gen/android/**/*.gradle*', 'frontend/src-tauri/gen/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache sccache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # was v4
        with:
          path: ~/.cache/sccache
          key: ${{ runner.os }}-sccache-android-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-sccache-android-
            ${{ runner.os }}-sccache-

      - name: Build Tauri Android App (fake signed release)
        run: nix develop .#android -c ./scripts/ci/android-release.sh
        env:
          MAPLE_ANDROID_FAKE_SIGNING: "1"
          MAPLE_ANDROID_WEB_ENVIRONMENT: pr

      - name: Show sccache stats
        if: always()
        run: nix develop .#android -c sccache --show-stats

      - name: Upload Android fake signed PR artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # was v4
        with:
          name: maple-android-fake-signed-release
          path: |
            frontend/src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
            frontend/src-tauri/gen/android/app/build/outputs/bundle/universalRelease/*.aab
            frontend/src-tauri/target/reproducibility/android-release-*.sha256
          retention-days: 5
