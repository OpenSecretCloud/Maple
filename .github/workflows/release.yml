name: Release

on:
  release:
    types: [created]

permissions:
  contents: read

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # was v4
        with:
          persist-credentials: false

      - name: Validate release tag
        id: get_version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ -z "${RELEASE_TAG}" ] || [ "${RELEASE_TAG}" != "${GITHUB_REF#refs/tags/}" ]; then
            echo "Release tag does not match GITHUB_REF" >&2
            exit 1
          fi

          version="$(./scripts/ci/validate-release-version.sh "${RELEASE_TAG}")"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

  build-tauri:
    needs: create-release
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-26-xlarge
            nix_shell: ci
            artifact_prefix: macos
          - platform: ubuntu-latest-8-cores
            nix_shell: desktop-linux
            artifact_prefix: linux

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # was v4
        with:
          persist-credentials: false

      # Xcode 26.5 is temporarily exposed as a beta app on macos-26 runners: https://github.com/actions/runner-images/issues/14108
      - name: Select Xcode 26.5
        if: startsWith(matrix.platform, 'macos-26')
        run: |
          set -euo pipefail
          for xcode_app in \
            /Applications/Xcode_26.5.0.app \
            /Applications/Xcode_26.5_beta_2.app \
            /Applications/Xcode_26.5_beta.app
          do
            if [ -x "${xcode_app}/Contents/Developer/usr/bin/xcodebuild" ]; then
              sudo xcode-select -s "${xcode_app}/Contents/Developer"
              xcodebuild -version
              exit 0
            fi
          done
          echo "Xcode 26.5 is not installed on this runner." >&2
          ls -1 /Applications/Xcode*.app >&2 || true
          exit 1

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # was v22
        with:
          github-token: ""

      - name: Cache sccache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # was v4
        with:
          path: ${{ startsWith(matrix.platform, 'macos') && '~/Library/Caches/Mozilla.sccache' || '~/.cache/sccache' }}
          key: ${{ runner.os }}-sccache-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-sccache-release-
            ${{ runner.os }}-sccache-

      # Ubuntu 24.04 restricts unprivileged user namespaces by default; linuxdeploy/AppImage
      # packaging uses bubblewrap and otherwise fails with "bwrap: setting up uid map: Permission denied".
      - name: Allow bubblewrap user namespaces
        if: matrix.platform == 'ubuntu-latest-8-cores'
        run: |
          set -euo pipefail
          if [ -e /proc/sys/kernel/apparmor_restrict_unprivileged_userns ]; then
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          fi
          if [ -e /proc/sys/kernel/unprivileged_userns_clone ]; then
            sudo sysctl -w kernel.unprivileged_userns_clone=1
          fi

      - name: Build Tauri desktop app
        run: nix develop .#${{ matrix.nix_shell }} -c ./scripts/ci/desktop-release.sh
        env:
          APPIMAGE_EXTRACT_AND_RUN: ${{ matrix.platform == 'ubuntu-latest-8-cores' && '1' || '' }}
          NO_STRIP: ${{ matrix.platform == 'ubuntu-latest-8-cores' && 'true' || '' }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Show sccache stats
        if: always()
        run: nix develop .#${{ matrix.nix_shell }} -c sccache --show-stats

      - name: Collect desktop release checksums
        run: |
          nix develop .#${{ matrix.nix_shell }} -c ./scripts/ci/attestation-manifest.sh \
            desktop-release-artifacts.sha256 \
            frontend/src-tauri/target/reproducibility/desktop-release-${{ matrix.artifact_prefix }}-final.sha256 \
            frontend/src-tauri/target/reproducibility/desktop-release-${{ matrix.artifact_prefix }}-*.sha256
          cat desktop-release-artifacts.sha256

      - name: Attest desktop release artifacts
        # Keep release uploads running if GitHub token policy rejects artifact attestation.
        continue-on-error: true
        uses: actions/attest@281a49d4cbb0a72c9575a50d18f6deb515a11deb # was v4
        with:
          subject-checksums: desktop-release-artifacts.sha256

      - name: Upload desktop release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          files=()
          while IFS= read -r -d '' file; do
            files+=("${file}")
          done < <(find frontend/src-tauri/target -type f \( \
            -name '*.dmg' -o \
            -name '*.app.tar.gz' -o \
            -name '*.app.tar.gz.sig' -o \
            -name '*.AppImage' -o \
            -name '*.AppImage.sig' -o \
            -name '*.deb' -o \
            -name '*.deb.sig' -o \
            -name '*.rpm' -o \
            -name '*.rpm.sig' -o \
            -path '*/reproducibility/desktop-release-*.sha256' \
          \) -print0 | LC_ALL=C sort -z)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No desktop release artifacts found." >&2
            exit 1
          fi

          gh release upload "${RELEASE_TAG}" "${files[@]}" --clobber

  build-android:
    needs: create-release
    runs-on: ubuntu-latest-8-cores
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # was v4
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # was v22
        with:
          github-token: ""

      - name: Cache Bun dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # was v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/bun.lock') }}

      - name: Cache Gradle
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # was v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('frontend/src-tauri/gen/android/**/*.gradle*', 'frontend/src-tauri/gen/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache sccache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # was v4
        with:
          path: ~/.cache/sccache
          key: ${{ runner.os }}-sccache-android-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-sccache-android-release-
            ${{ runner.os }}-sccache-

      - name: Build Tauri Android App
        run: nix develop .#android -c ./scripts/ci/android-release.sh
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Show sccache stats
        if: always()
        run: nix develop .#android -c sccache --show-stats

      - name: Collect Android release checksums
        run: |
          nix develop .#android -c ./scripts/ci/attestation-manifest.sh \
            android-release-artifacts.sha256 \
            frontend/src-tauri/target/reproducibility/android-release-final.sha256 \
            frontend/src-tauri/target/reproducibility/android-release-*.sha256
          cat android-release-artifacts.sha256

      - name: Attest Android release artifacts
        # Keep release uploads running if GitHub token policy rejects artifact attestation.
        continue-on-error: true
        uses: actions/attest@281a49d4cbb0a72c9575a50d18f6deb515a11deb # was v4
        with:
          subject-checksums: android-release-artifacts.sha256

      - name: Upload Android release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          files=()
          while IFS= read -r -d '' file; do
            files+=("${file}")
          done < <(find frontend/src-tauri -type f \( \
            -name '*.apk' -o \
            -name '*.aab' -o \
            -path '*/reproducibility/android-release-*.sha256' \
          \) -print0 | LC_ALL=C sort -z)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No Android release artifacts found." >&2
            exit 1
          fi

          gh release upload "${RELEASE_TAG}" "${files[@]}" --clobber

  build-ios:
    needs: create-release
    runs-on: macos-26-xlarge
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # was v4
        with:
          persist-credentials: false

      # Xcode 26.5 is temporarily exposed as a beta app on macos-26 runners: https://github.com/actions/runner-images/issues/14108
      - name: Select Xcode 26.5
        id: select_xcode
        run: |
          set -euo pipefail
          for xcode_app in \
            /Applications/Xcode_26.5.0.app \
            /Applications/Xcode_26.5_beta_2.app \
            /Applications/Xcode_26.5_beta.app
          do
            if [ -x "${xcode_app}/Contents/Developer/usr/bin/xcodebuild" ]; then
              sudo xcode-select -s "${xcode_app}/Contents/Developer"
              xcode_info="$(xcodebuild -version)"
              printf '%s\n' "${xcode_info}"
              printf 'version=%s\n' "$(printf '%s\n' "${xcode_info}" | awk '/^Xcode / { print $2; exit }')" >> "${GITHUB_OUTPUT}"
              printf 'build=%s\n' "$(printf '%s\n' "${xcode_info}" | awk '/^Build version / { print $3; exit }')" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          done
          echo "Xcode 26.5 is not installed on this runner." >&2
          ls -1 /Applications/Xcode*.app >&2 || true
          exit 1

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # was v22
        with:
          github-token: ""

      - name: Cache Xcode DerivedData and SourcePackages
        uses: irgaly/xcode-cache@4141f139f00e335c6e1031fb93e667181f86146f # was v1
        with:
          key: xcode-cache-ios-xcode26.5-${{ steps.select_xcode.outputs.build }}-${{ github.workflow }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            xcode-cache-ios-xcode26.5-${{ steps.select_xcode.outputs.build }}-${{ github.workflow }}-
            xcode-cache-ios-xcode26.5-${{ steps.select_xcode.outputs.build }}-

      - name: Cache ONNX Runtime iOS artifact
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # was v4
        with:
          path: |
            frontend/src-tauri/onnxruntime-ios
          key: release-onnxruntime-ios-artifact-1.22.2-xcode26.5-${{ steps.select_xcode.outputs.build }}-${{ hashFiles('flake.lock', 'flake.nix', 'scripts/ci/_common.sh', 'scripts/ci/ios-onnxruntime.sh', 'frontend/src-tauri/scripts/build-ios-onnxruntime-all.sh', 'frontend/src-tauri/scripts/canonicalize-static-archive.py', 'frontend/src-tauri/scripts/onnxruntime-pins.sh') }}
          restore-keys: |
            release-onnxruntime-ios-artifact-1.22.2-xcode26.5-${{ steps.select_xcode.outputs.build }}-

      - name: Prepare ONNX Runtime iOS artifact
        run: nix develop .#apple -c ./scripts/ci/ios-onnxruntime.sh
        timeout-minutes: 90

      - name: Build Tauri iOS App
        run: nix develop .#apple -c ./scripts/ci/ios-release.sh
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
          MAPLE_ENFORCE_IOS_SIGNED_REPRODUCIBILITY: "1"
        timeout-minutes: 90

      - name: Collect iOS release checksums
        run: |
          nix develop .#apple -c ./scripts/ci/attestation-manifest.sh \
            ios-release-artifacts.sha256 \
            frontend/src-tauri/target/reproducibility/ios-release-final.sha256 \
            frontend/src-tauri/target/reproducibility/ios-release-*.sha256 \
            frontend/src-tauri/target/reproducibility/ios-release-*.txt \
            frontend/src-tauri/target/reproducibility/ios-onnxruntime-*.sha256
          cat ios-release-artifacts.sha256

      - name: Attest iOS release artifacts
        # Keep release uploads running if GitHub token policy rejects artifact attestation.
        continue-on-error: true
        uses: actions/attest@281a49d4cbb0a72c9575a50d18f6deb515a11deb # was v4
        with:
          subject-checksums: ios-release-artifacts.sha256

      - name: Upload iOS release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          files=()
          while IFS= read -r -d '' file; do
            files+=("${file}")
          done < <(find frontend/src-tauri -type f \( \
            -name '*.ipa' -o \
            -path '*/reproducibility/ios-release-*.sha256' -o \
            -path '*/reproducibility/ios-release-*.txt' -o \
            -path '*/reproducibility/ios-onnxruntime-*.sha256' \
          \) -print0 | LC_ALL=C sort -z)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No iOS release artifacts found." >&2
            exit 1
          fi

          gh release upload "${RELEASE_TAG}" "${files[@]}" --clobber

  build-web:
    needs: create-release
    runs-on: ubuntu-latest-8-cores
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # was v4
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # was v22
        with:
          github-token: ""

      - name: Cache Bun dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # was v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/bun.lock') }}

      - name: Build web artifact
        run: nix develop .#ci -c ./scripts/ci/web.sh
        env:
          MAPLE_WEB_ENVIRONMENT: release

      - name: Collect web release checksums
        run: cat frontend/src-tauri/target/reproducibility/web-final.sha256

      - name: Attest web release artifact
        # Keep release uploads running if GitHub token policy rejects artifact attestation.
        continue-on-error: true
        uses: actions/attest@281a49d4cbb0a72c9575a50d18f6deb515a11deb # was v4
        with:
          subject-checksums: frontend/src-tauri/target/reproducibility/web-final.sha256

      - name: Upload web release artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          gh release upload "${RELEASE_TAG}" \
            frontend/src-tauri/target/reproducibility/maple-web-dist.tar.gz \
            frontend/src-tauri/target/reproducibility/web-final.sha256 \
            --clobber

  verify-android-release-artifacts:
    needs: build-android
    runs-on: ubuntu-latest-8-cores
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # was v4
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # was v22
        with:
          github-token: ""

      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          mkdir -p artifacts
          gh release download "${RELEASE_TAG}" -D artifacts

      - name: Verify Android release artifact reproducibility proofs
        env:
          MAPLE_REQUIRE_ANDROID_SIGNATURE_VERIFICATION: "1"
        run: nix develop .#android -c ./scripts/ci/verify-release-artifacts.sh artifacts android

  verify-desktop-release-artifacts:
    needs: build-tauri
    runs-on: macos-26-xlarge
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # was v4
        with:
          persist-credentials: false

      # Xcode 26.5 is temporarily exposed as a beta app on macos-26 runners: https://github.com/actions/runner-images/issues/14108
      - name: Select Xcode 26.5
        run: |
          set -euo pipefail
          for xcode_app in \
            /Applications/Xcode_26.5.0.app \
            /Applications/Xcode_26.5_beta_2.app \
            /Applications/Xcode_26.5_beta.app
          do
            if [ -x "${xcode_app}/Contents/Developer/usr/bin/xcodebuild" ]; then
              sudo xcode-select -s "${xcode_app}/Contents/Developer"
              xcodebuild -version
              exit 0
            fi
          done
          echo "Xcode 26.5 is not installed on this runner." >&2
          ls -1 /Applications/Xcode*.app >&2 || true
          exit 1

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # was v22
        with:
          github-token: ""

      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          mkdir -p artifacts
          gh release download "${RELEASE_TAG}" -D artifacts

      - name: Verify desktop release artifact reproducibility proofs
        run: nix develop .#ci -c ./scripts/ci/verify-release-artifacts.sh artifacts linux macos

  update-latest-json:
    needs: verify-desktop-release-artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # was v4
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # was v22
        with:
          github-token: ""

      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          mkdir -p artifacts
          gh release download "${RELEASE_TAG}" -D artifacts

      - name: Generate latest.json
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          MAPLE_LATEST_JSON_PUB_DATE: ${{ github.event.release.published_at || github.event.release.created_at }}
        run: nix develop .#ci -c ./scripts/ci/latest-json.sh artifacts latest.json

      - name: Collect latest.json checksums
        run: |
          nix develop .#ci -c ./scripts/ci/attestation-manifest.sh \
            latest-json-artifacts.sha256 \
            frontend/src-tauri/target/reproducibility/latest-json-final.sha256
          cat latest-json-artifacts.sha256

      - name: Attest latest.json
        # Keep release uploads running if GitHub token policy rejects artifact attestation.
        continue-on-error: true
        uses: actions/attest@281a49d4cbb0a72c9575a50d18f6deb515a11deb # was v4
        with:
          subject-checksums: latest-json-artifacts.sha256

      - name: Upload latest.json and provenance
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "${RELEASE_TAG}" \
            latest.json \
            frontend/src-tauri/target/reproducibility/latest-json-final.sha256 \
            --clobber

  verify-release-artifacts:
    needs:
      - verify-desktop-release-artifacts
      - build-ios
      - build-web
      - update-latest-json
      - verify-android-release-artifacts
    runs-on: macos-26-xlarge
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # was v4
        with:
          persist-credentials: false

      # Xcode 26.5 is temporarily exposed as a beta app on macos-26 runners: https://github.com/actions/runner-images/issues/14108
      - name: Select Xcode 26.5
        run: |
          set -euo pipefail
          for xcode_app in \
            /Applications/Xcode_26.5.0.app \
            /Applications/Xcode_26.5_beta_2.app \
            /Applications/Xcode_26.5_beta.app
          do
            if [ -x "${xcode_app}/Contents/Developer/usr/bin/xcodebuild" ]; then
              sudo xcode-select -s "${xcode_app}/Contents/Developer"
              xcodebuild -version
              exit 0
            fi
          done
          echo "Xcode 26.5 is not installed on this runner." >&2
          ls -1 /Applications/Xcode*.app >&2 || true
          exit 1

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # was v22
        with:
          github-token: ""

      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          mkdir -p artifacts
          gh release download "${RELEASE_TAG}" -D artifacts

      - name: Verify release artifact reproducibility proofs
        run: nix develop .#ci -c ./scripts/ci/verify-release-artifacts.sh artifacts linux macos ios web latest-json
        env:
          MAPLE_ENFORCE_IOS_SIGNED_REPRODUCIBILITY: "1"
