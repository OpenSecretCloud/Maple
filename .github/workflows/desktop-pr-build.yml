name: Desktop App PR Build

permissions:
  contents: read

on:
  pull_request:
    branches: [ master ]

jobs:
  build-macos:
    runs-on: macos-latest-xlarge
    strategy:
      matrix:
        target: [universal-apple-darwin]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # was v4
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7 # was v1
        with:
          bun-version: 1.3.5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # was stable
        with:
          toolchain: 1.95.0
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build Tauri App (macOS, unsigned)
        working-directory: ./frontend
        run: |
          bun tauri build --target ${{ matrix.target }} --no-sign --config '{"bundle":{"createUpdaterArtifacts":false}}'
        env:
          VITE_OPEN_SECRET_API_URL: https://enclave.secretgpt.ai
          VITE_MAPLE_BILLING_API_URL: https://billing-dev.opensecret.cloud
          VITE_CLIENT_ID: ba5a14b5-d915-47b1-b7b1-afda52bc5fc6

      - name: Upload macOS PR Build
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # was v4
        with:
          name: maple-macos-universal-pr
          path: |
            frontend/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            frontend/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
          retention-days: 5

  build-linux:
    runs-on: ubuntu-latest-8-cores
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # was v4
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7 # was v1
        with:
          bun-version: 1.3.5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # was stable
        with:
          toolchain: 1.95.0

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
              libssl-dev \
              libgtk-3-dev \
              libayatana-appindicator3-dev \
              librsvg2-dev

      - name: Provide ONNX Runtime (Linux)
        run: |
          ./frontend/src-tauri/scripts/provide-linux-onnxruntime.sh >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Install Tauri CLI
        run: |
          if ! command -v cargo-tauri &> /dev/null; then
            cargo install tauri-cli --version "2.9.2" --locked
          else
            echo "Tauri CLI already installed"
          fi
        env:
          CARGO_CFG_TARGET_OS: linux

      - name: Build Tauri App (Linux, unsigned)
        working-directory: ./frontend
        run: cargo tauri build --verbose --no-sign --config '{"bundle":{"createUpdaterArtifacts":false}}'
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          NO_STRIP: true
          VITE_OPEN_SECRET_API_URL: https://enclave.secretgpt.ai
          VITE_MAPLE_BILLING_API_URL: https://billing-dev.opensecret.cloud
          VITE_CLIENT_ID: ba5a14b5-d915-47b1-b7b1-afda52bc5fc6

      - name: Upload Linux PR Builds
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # was v4
        with:
          name: maple-linux-pr
          path: |
            frontend/src-tauri/target/release/bundle/appimage/*.AppImage
            frontend/src-tauri/target/release/bundle/deb/*.deb
          retention-days: 5
