name: Desktop App CI

permissions:
  contents: read

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-macos:
    runs-on: macos-latest-xlarge
    strategy:
      matrix:
        target: [universal-apple-darwin]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.2.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar/sccache
            /opt/homebrew/Cellar/openssl@3
          key: ${{ runner.os }}-brew-${{ hashFiles('.github/workflows/desktop-build.yml') }}
          restore-keys: |
            ${{ runner.os }}-brew-

      - name: Install sccache
        run: |
          brew install sccache
          brew link --overwrite --force sccache
          sccache --version

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Mozilla.sccache
          key: ${{ runner.os }}-sccache-macos-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-sccache-macos-
            ${{ runner.os }}-sccache-

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: bun install

      - name: Configure sccache
        run: |
          {
            echo "RUSTC_WRAPPER=sccache"
            echo "SCCACHE_CACHE_SIZE=2G"
          } >> "$GITHUB_ENV"

      # Fork PRs do not receive repo secrets. Detect which are present and
      # skip steps / pass an unsigned config override accordingly. On push to
      # master and PRs from the upstream repo all secrets are available and
      # the build runs with full signing + notarization.
      - name: Detect signing capability
        id: signing
        env:
          TAURI_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE }}
        shell: bash
        run: |
          if [ -z "$TAURI_KEY" ]; then
            echo "skip_updater_signing=true" >> "$GITHUB_OUTPUT"
            echo "::notice::TAURI_SIGNING_PRIVATE_KEY unavailable (likely fork PR); skipping updater artifact signing"
          else
            echo "skip_updater_signing=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -z "$APPLE_CERT" ]; then
            echo "skip_apple_signing=true" >> "$GITHUB_OUTPUT"
            echo "::notice::APPLE_CERTIFICATE unavailable (likely fork PR); building unsigned .app/.dmg"
          else
            echo "skip_apple_signing=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Write unsigned config override
        if: steps.signing.outputs.skip_updater_signing == 'true'
        shell: bash
        run: |
          cat > frontend/src-tauri/tauri.unsigned.conf.json <<'EOF'
          {
            "bundle": {
              "createUpdaterArtifacts": false
            }
          }
          EOF

      - name: Import Apple Developer Certificate
        if: steps.signing.outputs.skip_apple_signing == 'false'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo $APPLE_CERTIFICATE | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain

      - name: Verify Certificate
        if: steps.signing.outputs.skip_apple_signing == 'false'
        run: |
          CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application")
          CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
          echo "CERT_ID=$CERT_ID" >> "$GITHUB_ENV"
          echo "Certificate imported."

      - name: Build Tauri App (macOS)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ env.CERT_ID }}
          VITE_OPEN_SECRET_API_URL: ${{ github.event_name == 'pull_request' && 'https://enclave.secretgpt.ai' || 'https://enclave.trymaple.ai' }}
          VITE_MAPLE_BILLING_API_URL: ${{ github.event_name == 'pull_request' && 'https://billing-dev.opensecret.cloud' || 'https://billing.opensecret.cloud' }}
          VITE_CLIENT_ID: ba5a14b5-d915-47b1-b7b1-afda52bc5fc6
        with:
          projectPath: './frontend'
          args: --target ${{ matrix.target }} ${{ steps.signing.outputs.skip_updater_signing == 'true' && '--config src-tauri/tauri.unsigned.conf.json' || '' }}

      - name: Show sccache stats
        run: sccache --show-stats

      - name: Upload macOS Build
        uses: actions/upload-artifact@v4
        with:
          name: maple-macos-universal
          path: |
            frontend/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            frontend/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
          retention-days: 5

  build-linux:
    runs-on: ubuntu-latest-8-cores
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.2.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install sccache
        run: |
          SCCACHE_VERSION=0.8.2
          SCCACHE_URL="https://github.com/mozilla/sccache/releases/download/v${SCCACHE_VERSION}/sccache-v${SCCACHE_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          curl -L "$SCCACHE_URL" | tar xz
          sudo mv sccache-v${SCCACHE_VERSION}-x86_64-unknown-linux-musl/sccache /usr/local/bin/
          chmod +x /usr/local/bin/sccache
          sccache --version

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/sccache
          key: ${{ runner.os }}-sccache-linux-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-sccache-linux-
            ${{ runner.os }}-sccache-

      - name: Cache Cargo bin (Tauri CLI)
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/
          key: ${{ runner.os }}-cargo-bin-tauri-cli-2.9.2
          restore-keys: |
            ${{ runner.os }}-cargo-bin-tauri-cli-
            ${{ runner.os }}-cargo-bin-

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
              libssl-dev \
              libgtk-3-dev \
              libayatana-appindicator3-dev \
              librsvg2-dev

      - name: Provide ONNX Runtime (Linux)
        run: |
          ORT_VERSION=1.22.0
          ORT_ROOT="$RUNNER_TEMP/onnxruntime"
          mkdir -p "$ORT_ROOT"
          curl -fL --retry 5 --retry-delay 2 --retry-all-errors \
            "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-linux-x64-${ORT_VERSION}.tgz" \
            | tar -xz -C "$ORT_ROOT"
          echo "ORT_LIB_LOCATION=$ORT_ROOT/onnxruntime-linux-x64-${ORT_VERSION}" >> "$GITHUB_ENV"
          echo "ORT_SKIP_DOWNLOAD=true" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$ORT_ROOT/onnxruntime-linux-x64-${ORT_VERSION}/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: bun install

      - name: Install Tauri CLI
        run: |
          if ! command -v cargo-tauri &> /dev/null; then
            cargo install tauri-cli --version "2.9.2" --locked
          else
            echo "Tauri CLI already installed"
          fi
        env:
          CARGO_CFG_TARGET_OS: linux

      - name: Configure sccache
        run: |
          {
            echo "RUSTC_WRAPPER=sccache"
            echo "SCCACHE_DIR=$HOME/.cache/sccache"
            echo "SCCACHE_CACHE_SIZE=2G"
          } >> "$GITHUB_ENV"

      # Fork PRs do not receive TAURI_SIGNING_PRIVATE_KEY. When absent, write
      # an unsigned config override so tauri does not attempt updater
      # artifact signing after producing the bundles.
      - name: Detect signing capability
        id: signing
        env:
          KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        shell: bash
        run: |
          if [ -z "$KEY" ]; then
            echo "skip_signing=true" >> "$GITHUB_OUTPUT"
            echo "::notice::TAURI_SIGNING_PRIVATE_KEY unavailable (likely fork PR); skipping updater artifact signing"
          else
            echo "skip_signing=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Write unsigned config override
        if: steps.signing.outputs.skip_signing == 'true'
        shell: bash
        run: |
          cat > frontend/src-tauri/tauri.unsigned.conf.json <<'EOF'
          {
            "bundle": {
              "createUpdaterArtifacts": false
            }
          }
          EOF

      - name: Build Tauri App (Linux)
        working-directory: ./frontend
        run: |
          if [ "${{ steps.signing.outputs.skip_signing }}" = "true" ]; then
            cargo tauri build --verbose --config src-tauri/tauri.unsigned.conf.json
          else
            cargo tauri build --verbose
          fi
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          NO_STRIP: true
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_OPEN_SECRET_API_URL: ${{ github.event_name == 'pull_request' && 'https://enclave.secretgpt.ai' || 'https://enclave.trymaple.ai' }}
          VITE_MAPLE_BILLING_API_URL: ${{ github.event_name == 'pull_request' && 'https://billing-dev.opensecret.cloud' || 'https://billing.opensecret.cloud' }}
          VITE_CLIENT_ID: ba5a14b5-d915-47b1-b7b1-afda52bc5fc6

      - name: Show sccache stats
        run: sccache --show-stats

      - name: Upload Linux Builds
        uses: actions/upload-artifact@v4
        with:
          name: maple-linux
          path: |
            frontend/src-tauri/target/release/bundle/appimage/*.AppImage
            frontend/src-tauri/target/release/bundle/deb/*.deb
          retention-days: 5
